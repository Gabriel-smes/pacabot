<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PacaBot — Producto</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28; --border:#2a2a3d;
  --accent:#7c5cfc; --accent2:#fc5c7d; --green:#2ecc71; --yellow:#f1c40f;
  --red:#e74c3c; --text:#e8e8f0; --muted:#6b6b8a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.header{background:linear-gradient(135deg,#1a0a2e,#0a0a1f);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted);}
.container{max-width:500px;margin:0 auto;padding:20px;}
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.product-page{display:none;}
.product-img{width:100%;height:260px;object-fit:cover;border-radius:16px;border:1px solid var(--border);margin-bottom:16px;}
.product-3d{width:100%;height:260px;border-radius:16px;border:1px solid var(--border);margin-bottom:16px;background:var(--surface2);}
.product-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px;}
.product-code{font-size:12px;color:var(--muted);margin-bottom:16px;}
.product-desc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:13px;color:var(--text);line-height:1.6;margin-bottom:16px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;}
.green{color:var(--green)}.blue{color:#5b9cf6}.red-c{color:var(--red)}
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px;border:none;border-radius:14px;
  background:#25d366;color:white;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;text-decoration:none;margin-bottom:12px;
  transition:all 0.2s;
}
.btn-wa:hover{opacity:0.9;transform:translateY(-1px);}
.btn-ver{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px;border:1px solid var(--border);border-radius:14px;
  background:var(--surface);color:var(--text);
  font-family:'Syne',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;text-decoration:none;margin-bottom:20px;
  transition:all 0.2s;
}
.not-found{text-align:center;padding:60px 20px;}
.not-found-icon{font-size:48px;margin-bottom:16px;}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);margin-top:20px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📦 PacaBot</div>
  <div class="badge">Vista pública</div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Cargando producto...</p>
  </div>

  <div class="not-found" id="notFound" style="display:none">
    <div class="not-found-icon">❌</div>
    <p style="font-size:16px;font-weight:600;margin-bottom:8px">Producto no encontrado</p>
    <p style="color:var(--muted);font-size:13px">El producto que buscas no existe o fue eliminado.</p>
  </div>

  <div class="product-page" id="productPage">
    <div id="mediaSection"></div>
    <div class="product-name" id="productName"></div>
    <div class="product-code" id="productCode"></div>
    <div class="product-desc" id="productDesc" style="display:none"></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val blue" id="productPrecio"></div>
        <div class="stat-label">Precio</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="productStock"></div>
        <div class="stat-label">Stock disponible</div>
      </div>
    </div>
    <a id="btnWhatsapp" class="btn-wa" target="_blank">
      💬 Consultar por WhatsApp
    </a>
  <a href="/catalogo" class="btn-ver"></a>
    🏪 Ver más productos
    </a>
  </div>
</div>

<div class="footer">
  Powered by PacaBot · Sistema de inventario inteligente
</div>

<script>
const WA_NUMBER = '51937580454';
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:3000/api'
  : 'https://pacabot.onrender.com/api';

async function loadProduct() {
  const id = window.location.pathname.split('/').pop().toUpperCase();

  try {
    const r = await fetch(`${API}/products/${id}`);
    const d = await r.json();

    if (!d.success) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('notFound').style.display = 'block';
      return;
    }

    const p = d.data;
    const sn = Number(p.stock);

    // Media
    let mediaHTML = '';
    if (p.modelo3d) {
      mediaHTML = `<model-viewer src="${p.modelo3d}" alt="${p.nombre}" auto-rotate camera-controls class="product-3d"></model-viewer>`;
    } else if (p.foto) {
      mediaHTML = `<img src="${p.foto}" alt="${p.nombre}" class="product-img">`;
    }
    document.getElementById('mediaSection').innerHTML = mediaHTML;

    // Info
    document.getElementById('productName').textContent = p.nombre;
    document.getElementById('productCode').textContent = `Código: ${p.id} · ${p.categoria}`;

    if (p.descripcion) {
      document.getElementById('productDesc').style.display = 'block';
      document.getElementById('productDesc').textContent = `📝 ${p.descripcion}`;
    }

    document.getElementById('productPrecio').textContent = `S/${p.venta}`;
    
    const stockEl = document.getElementById('productStock');
    stockEl.textContent = sn;
    stockEl.className = `stat-val ${sn <= 0 ? 'red-c' : sn <= 2 ? 'yellow' : 'green'}`;

    // WhatsApp
    const msg = encodeURIComponent(`Hola! Vi el producto *${p.nombre}* (${p.id}) en PacaBot y me interesa. ¿Está disponible?`);
    document.getElementById('btnWhatsapp').href = `https://wa.me/${WA_NUMBER}?text=${msg}`;

    // Título
    document.title = `${p.nombre} — PacaBot`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('productPage').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('notFound').style.display = 'block';
  }
}

loadProduct();
</script>
</body>
</html>
